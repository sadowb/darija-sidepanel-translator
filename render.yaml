services:
  - type: web
    name: darija-sidepanel-translator
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_URL
        value: https://api.groq.com/openai/v1/chat/completions
      - key: API_USERNAME
        value: translator
      - key: API_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
