<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Darija Translator Settings</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options-body">
    <main class="settings-card">
      <p class="eyebrow">DARIJA TRANSLATOR</p>
      <h1>Settings</h1>
      <p class="helper">Credentials are stored locally for this classroom demo. Use HTTPS for deployed backends.</p>
      <form id="settingsForm">
        <label for="apiUrl">Backend URL</label>
        <input id="apiUrl" type="url" placeholder="https://…onrender.com" required>
        <label for="username">Username</label>
        <input id="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>
        <label class="checkbox-row">
          <input id="autoTranslate" type="checkbox">
          Automatically translate selected text
        </label>
        <p id="settingsStatus" class="settings-status" role="status"></p>
        <div class="button-row">
          <button class="button primary" type="submit">Save</button>
          <button id="testButton" class="button secondary" type="button">Test connection</button>
        </div>
      </form>
    </main>
    <script src="shared/settings-store.js"></script>
    <script src="shared/api-client.js"></script>
    <script src="options.js"></script>
  </body>
</html>
