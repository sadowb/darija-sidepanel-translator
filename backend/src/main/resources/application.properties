spring.application.name=darija-sidepanel-translator
server.address=0.0.0.0
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

llm.api-url=${LLM_API_URL:https://api.groq.com/openai/v1/chat/completions}
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:llama-3.3-70b-versatile}
llm.timeout-ms=${LLM_TIMEOUT_MS:30000}
app.security.username=${API_USERNAME:translator}
app.security.password=${API_PASSWORD:change-me}
app.cors.allowed-origins=${ALLOWED_ORIGINS:}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
