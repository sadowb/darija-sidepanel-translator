spring.application.name=darija-sidepanel-translator
server.address=0.0.0.0
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.security.username=${API_USERNAME:translator}
app.security.password=${API_PASSWORD:change-me}
app.cors.allowed-origins=${ALLOWED_ORIGINS:}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
